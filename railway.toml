# Railway 部署配置
# https://docs.railway.app/reference/ railway-config/

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"

[[services]]
type = "web"
name = "memory-market"

[services.env]
PORT = "8000"
DEBUG = "false"
