# Render 部署配置
# https://render.com/docs/yaml-spec

services:
  # Web 服务
  - type: web
    name: memory-market
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: memory_market_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: false
    healthCheckPath: /health

  # 数据库 (PostgreSQL)
  - type: pserv
    name: memory_market_db
    databaseName: memory_market
    user: memory_market_user
    plan: free # 可选: free, starter, standard, pro
