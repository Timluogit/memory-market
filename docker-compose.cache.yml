version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: memory-market-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      - REDIS_MAX_MEMORY=2gb
      - REDIS_MAX_MEMORY_POLICY=allkeys-lru
    networks:
      - memory-market
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis监控（可选）
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: memory-market-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - memory-market
    profiles:
      - tools

volumes:
  redis_data:
    driver: local

networks:
  memory-market:
    external: true
