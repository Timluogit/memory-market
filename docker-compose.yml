version: '3.8'

services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memory-market-qdrant
    ports:
      - "6333:6333"  # Qdrant API
      - "6334:6334"  # Qdrant Dashboard（可选）
    volumes:
      - ./data/qdrant:/qdrant/storage  # Qdrant 数据持久化
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - memory-market-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-market-api
    ports:
      - "8000:8000"   # FastAPI 应用
      - "8001:8001"   # MCP SSE 端点（备用，如需运行独立 MCP 服务）
    volumes:
      # 数据持久化：SQLite 数据库
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # 应用配置
      - APP_NAME=Agent Memory Market
      - DEBUG=false
      # 数据库配置（绝对路径用于容器内持久化）
      - DATABASE_URL=sqlite+aiosqlite:////app/data/memory_market.db
      # JWT 配置
      - JWT_SECRET=change-this-in-production-use-env-file
      # 积分系统配置
      - MVP_FREE_MODE=true
      - INITIAL_CREDITS=999999
      - SELLER_SHARE_RATE=1.0
      - PLATFORM_FEE_RATE=0.0
      # MCP 配置（可选，如果需要单独运行 MCP SSE 服务）
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MEMORY_MARKET_API_URL=http://localhost:8000/api/v1
      # Qdrant 配置（向量搜索）
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=
      - EMBEDDING_MODEL=BAAI/bge-small-zh-v1.5
      - EMBEDDING_DEVICE=cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - memory-market-net

networks:
  memory-market-net:
    driver: bridge
