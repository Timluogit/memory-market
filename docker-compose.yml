version: "3.9"

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  environment:
    - DATABASE_URL=sqlite+aiosqlite:///./data/memory_market.db
    - REDIS_URL=redis://redis:6379/0
    - CACHE_ENABLED=true
    - SEARCH_ENGINE_MODE=in-memory
    - UVICORN_WORKERS=2
  volumes:
    - app-data:/app/data
    - app-logs:/app/logs
  networks:
    - memory-market-net
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - memory-market-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- App Instance 1 ----
  app-1:
    <<: *app-common
    container_name: mm-app-1
    hostname: app-1

  # ---- App Instance 2 ----
  app-2:
    <<: *app-common
    container_name: mm-app-2
    hostname: app-2

  # ---- Nginx Load Balancer ----
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    networks:
      - memory-market-net
    depends_on:
      - app-1
      - app-2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  app-data:
  app-logs:
  redis-data:
  nginx-logs:

networks:
  memory-market-net:
    driver: bridge
