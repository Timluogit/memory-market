# Prometheus 配置文件
# Memory Market 监控系统

global:
  scrape_interval: 15s  # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'memory-market'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'  # Alertmanager 地址

# 告警规则文件
rule_files:
  - "alerts/*.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Memory Market API Metrics
  - job_name: 'memory-market-api'
    scrape_interval: 10s  # 更频繁的抓取
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'api'
          environment: 'production'

  # Qdrant Metrics（如果暴露）
  - job_name: 'qdrant'
    static_configs:
      - targets: ['host.docker.internal:6333']
        labels:
          service: 'qdrant'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['host.docker.internal:9187']
        labels:
          service: 'postgres'

  # Node Exporter（系统指标）
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: 'node'

  # Jaeger Collector Metrics
  - job_name: 'jaeger'
    static_configs:
      - targets: ['localhost:14269']
        labels:
          service: 'jaeger'

  # Grafana Metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'grafana'
