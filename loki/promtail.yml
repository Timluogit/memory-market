# Promtail 配置文件
# Memory Market 日志采集代理

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # 采集应用日志（JSON 格式）
  - job_name: memory-market-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: memory-market-api
          environment: production
          __path__: /app/logs/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            trace_id: trace_id
            user_id: user_id
            request_id: request_id
      - labels:
          level:
          logger:
      - output:
          source: message

  # 采集系统日志
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog

  # 采集 Docker 容器日志
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
