# 告警规则配置
# Memory Market 告警规则

groups:
  - name: critical_alerts
    interval: 30s
    rules:
      # 服务宕机告警
      - alert: ServiceDown
        expr: up{job="memory-market-api"} == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Memory Market API service is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."
          runbook_url: "https://docs.memory-market.com/runbooks/service-down"

      # 错误率飙升
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes."
          runbook_url: "https://docs.memory-market.com/runbooks/high-error-rate"

  - name: performance_alerts
    interval: 1m
    rules:
      # API 响应时间过慢
      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path)
          ) > 1.0
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High API latency detected"
          description: "P95 latency for {{ $labels.path }} is {{ $value }}s for the last 10 minutes."
          runbook_url: "https://docs.memory-market.com/runbooks/high-latency"

      # 数据库查询慢
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            rate(db_query_duration_seconds_bucket[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Slow database queries detected"
          description: "P95 database query latency is {{ $value }}s."
          runbook_url: "https://docs.memory-market.com/runbooks/slow-db-queries"

      # Qdrant 查询慢
      - alert: SlowVectorSearch
        expr: |
          histogram_quantile(0.95,
            rate(qdrant_query_duration_seconds_bucket[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Slow vector search queries"
          description: "P95 Qdrant query latency is {{ $value }}s."
          runbook_url: "https://docs.memory-market.com/runbooks/slow-vector-search"

      # 搜索延迟高
      - alert: HighSearchLatency
        expr: |
          histogram_quantile(0.95,
            rate(search_duration_seconds_bucket[5m])
          ) > 2.0
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High search latency"
          description: "P95 search latency is {{ $value }}s."
          runbook_url: "https://docs.memory-market.com/runbooks/high-search-latency"

  - name: business_alerts
    interval: 5m
    rules:
      # 异常交易模式
      - alert: UnusualTransactionPattern
        expr: |
          rate(transactions_total[15m]) >
          (
            avg_over_time(rate(transactions_total[1h])[30m:1h])
            * 5
          )
        for: 10m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "Unusual transaction pattern detected"
          description: "Transaction rate is {{ $value | humanize }} tx/min, which is 5x higher than normal."
          runbook_url: "https://docs.memory-market.com/runbooks/unusual-transactions"

      # 用户活跃度异常下降
      - alert: DropInActiveUsers
        expr: |
          active_users_total <
          (
            avg_over_time(active_users_total[1h])[30m:1h]
            * 0.5
          )
        for: 30m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "Significant drop in active users"
          description: "Active users dropped to {{ $value }}, 50% lower than average."
          runbook_url: "https://docs.memory-market.com/runbooks/user-drop"

      # 记忆数量异常（数据完整性问题）
      - alert: UnexpectedMemoryCountDrop
        expr: |
          rate(memories_total[10m]) < -100
        for: 5m
        labels:
          severity: critical
          category: business
        annotations:
          summary: "Unexpected drop in memory count"
          description: "Memory count is decreasing rapidly: {{ $value }} memories/min."
          runbook_url: "https://docs.memory-market.com/runbooks/memory-drop"

  - name: system_alerts
    interval: 1m
    rules:
      # CPU 使用率过高
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}."
          runbook_url: "https://docs.memory-market.com/runbooks/high-cpu"

      # 内存使用率过高
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}."
          runbook_url: "https://docs.memory-market.com/runbooks/high-memory"

      # 磁盘空间不足
      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 15
        for: 10m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "Low disk space"
          description: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} has {{ $value }}% free space."
          runbook_url: "https://docs.memory-market.com/runbooks/low-disk-space"

  - name: availability_alerts
    interval: 30s
    rules:
      # Qdrant 不可用
      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Qdrant service is down"
          description: "Qdrant vector database has been down for 2 minutes."
          runbook_url: "https://docs.memory-market.com/runbooks/qdrant-down"

      # PostgreSQL 不可用
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "PostgreSQL service is down"
          description: "PostgreSQL database has been down for 2 minutes."
          runbook_url: "https://docs.memory-market.com/runbooks/postgres-down"
