# Alertmanager 配置文件
# Memory Market 告警通知配置

global:
  # 全局默认值
  resolve_timeout: 5m
  # SMTP 配置（邮件通知）
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@memory-market.com'
  smtp_auth_username: 'alertmanager@memory-market.com'
  smtp_auth_password: 'your-password'
  # Slack Webhook 配置
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

# 路由配置
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  # 子路由：根据严重程度和类别路由
  routes:
    # 关键告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 0s
      repeat_interval: 5m

    # 警告告警
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 30m

    # 服务可用性告警
    - match:
        category: availability
      receiver: 'availability-receiver'
      group_wait: 0s
      repeat_interval: 5m

    # 业务告警
    - match:
        category: business
      receiver: 'business-receiver'

    # 系统告警
    - match:
        category: system
      receiver: 'system-receiver'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default-receiver'
    email_configs:
      - to: 'team@memory-market.com'
        headers:
          Subject: '[Alert] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts'
        title: 'Memory Market Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # 关键告警接收器
  - name: 'critical-receiver'
    email_configs:
      - to: 'on-call@memory-market.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL ALERT'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'danger'
    webhook_configs:
      - url: 'http://localhost:5000/webhook/critical'
        send_resolved: true

  # 警告接收器
  - name: 'warning-receiver'
    email_configs:
      - to: 'team@memory-market.com'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts'
        title: '⚠️ WARNING'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'warning'

  # 服务可用性接收器
  - name: 'availability-receiver'
    email_configs:
      - to: 'on-call@memory-market.com'
        headers:
          Subject: '[AVAILABILITY] {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#availability'
        title: '🔴 Service Down'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'danger'

  # 业务接收器
  - name: 'business-receiver'
    slack_configs:
      - channel: '#business-metrics'
        title: '📊 Business Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'warning'

  # 系统接收器
  - name: 'system-receiver'
    slack_configs:
      - channel: '#system-health'
        title: '🖥️ System Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        color: 'warning'

# 抑制规则（防止告警风暴）
inhibit_rules:
  # 如果服务已宕机，抑制该服务的所有其他告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '(HighErrorRate|HighAPILatency|SlowDatabaseQueries)'
    equal: ['service', 'instance']

  # 如果数据库已宕机，抑制数据库相关告警
  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      alertname: '(SlowDatabaseQueries|UnusualTransactionPattern|UnexpectedMemoryCountDrop)'
    equal: ['instance']

  # 如果 Qdrant 已宕机，抑制 Qdrant 相关告警
  - source_match:
      alertname: 'QdrantDown'
    target_match_re:
      alertname: '(SlowVectorSearch|HighSearchLatency)'
    equal: ['instance']
